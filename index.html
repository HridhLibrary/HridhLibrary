<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Hridhaan Public Library</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../CSS/style.css">

</head>

<body>

<div class="background"></div>

<header>
    <div class="hero">
        <h1>📚 Hridhlibrary</h1>
        <p>The Unofficial Library all of you have been using</p>
        <a href="../admin.html" class="admin-btn">👤 Admin Login</a>
    </div>
</header>

<main>
    <!-- Search -->
    <section class="search-section">
        <input type="text" id="search" placeholder="🔍 Search by title, author, genre or series">
    </section>

    <!-- Stats -->
    <section class="stats">
        <div class="stat-card">
            <h2 id="books">0</h2>
            <p>Total Books</p>
        </div>
        <div class="stat-card">
            <h2 id="genres">0</h2>
            <p>Genres</p>
        </div>
        <div class="stat-card">
            <h2 id="available">0</h2>
            <p>Available</p>
        </div>
        <div class="stat-card">
            <h2 id="borrowed">0</h2>
            <p>Borrowed</p>
        </div>
    </section>

    <!-- Featured -->
    <section class="featured">
        <h2>⭐ Featured Book</h2>
        <div id="featuredBook"></div>
    </section>

    <!-- Library -->
    <section class="library-section">
        <h2>📚 Library Collection</h2>
        <div id="library"></div>
    </section>
</main>

<!-- Book Modal -->
<div id="modal" class="modal hidden">
    <div class="modal-content">
        <span id="closeModal">&times;</span>
        <div id="modalBody"></div>
    </div>
</div>

<!-- Request Modal -->
<div id="requestModal" class="modal hidden">
    <div class="modal-content request-modal">
        <span class="close" onclick="closeRequestModal()">&times;</span>
        <h2>📖 Request Book</h2>
        
        <div class="book-info-box">
            <p><strong id="reqBookTitle">-</strong></p>
            <p class="author" id="reqBookAuthor">-</p>
            <p class="status" id="reqBookStatus">Status</p>
        </div>

    <form onsubmit="event.preventDefault(); submitRequest();">

        <div class="form-group">
        <label for="reqName">Your Name</label>
        <input
            type="text"
            id="reqName"
            placeholder="Full Name"
            required>
        </div>

        <div class="form-row">

        <div class="form-group">
            <label for="reqClass">Class</label>
            <input
                type="text"
                id="reqClass"
                placeholder="e.g. 7"
                required>
        </div>

        <div class="form-group">
            <label for="reqSection">Section</label>
            <input
                type="text"
                id="reqSection"
                placeholder="A"
                required>
        </div>

        </div>

        <div class="form-group">

        <label for="reqPhone">Phone Number</label>

        <input
            type="tel"
            id="reqPhone"
            placeholder="9876543210"
            maxlength="10"
            pattern="[0-9]{10}"
            required>

        </div>

        <div class="form-row">

        <div class="form-group">
            <label for="reqRequestDate">Borrow Date</label>
            <input
                type="date"
                id="reqRequestDate"
                required>
        </div>

        <div class="form-group">
            <label for="reqReturnDate">Return Date</label>
            <input
                type="date"
                id="reqReturnDate"
                required>
        </div>

    </div>

    <button
        type="submit"
        class="submit-btn">

        📚 Borrow Book

    </button>

</form>

    </div>
</div>


<footer>
    <p>Hridhaan Public Library © 2026</p>
</footer>

<script src="../JS/api.js"></script>
<script src="../JS/app.js"></script>

</body>

</html>
